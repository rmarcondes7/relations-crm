<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Relations">
<title>Relations — Personal CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FFFDF9;--bg:#F5F1EB;--dark:#1C1A17;--accent:#C17B4E;--accent-light:#E8A87C;--muted:#7A7266;--border:#EAE6DF;--card:#FFFDF9;--tag-bg:#F0EDE8;--tag-color:#6B6560;--input-bg:#FAFAF7;--green:#5A8A6A;--blue:#4A6AAA}
html,body{min-height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark)}

/* HEADER */
.header{background:var(--dark);padding:14px 18px;position:sticky;top:0;z-index:200;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.header-title{font-family:'Playfair Display',serif;font-size:21px;color:var(--cream);font-weight:700}
.header-sub{font-size:11px;color:#8A8478;margin-top:1px}
.ov{color:var(--accent-light)}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#5A8A6A;margin-left:6px;vertical-align:middle}
.sync-dot.syncing{background:var(--accent-light);animation:pulse 1s infinite}
.sync-dot.error{background:#C05A5A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hbtns{display:flex;gap:6px;flex-wrap:wrap}
.hbtn{background:rgba(255,255,255,0.1);color:var(--cream);border:none;border-radius:7px;padding:7px 10px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;white-space:nowrap}
.hbtn.active{background:var(--accent)}
.btn-new{background:var(--accent);color:var(--cream);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* NAV TABS */
.nav-tabs{display:flex;background:var(--dark);padding:0 18px 12px;gap:6px}
.nav-tab{color:#8A8478;border:none;background:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s}
.nav-tab.active{background:rgba(255,255,255,0.12);color:var(--cream)}

/* BANNERS */
.banner{padding:11px 18px;border-bottom:2px solid}
.banner.overdue-banner{background:#FDF3EC;border-color:#E8C9A0}
.banner.bday-banner{background:#EFF5FF;border-color:#B8D0F0}
.banner-hdr{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.overdue-banner .banner-hdr{color:var(--accent)}
.bday-banner .banner-hdr{color:var(--blue)}
.alert-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.06);gap:10px}
.alert-row:last-child{border-bottom:none;padding-bottom:0}
.alert-name{font-size:13px;font-weight:600;color:var(--dark)}
.alert-meta{font-size:11px;color:var(--muted);margin-top:1px}
.alert-btns{display:flex;gap:5px;flex-shrink:0}
.btn-aa{border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-aa.log{background:var(--accent);color:#fff}
.btn-aa.wa{background:#25D366;color:#fff}

/* DASHBOARD */
.dashboard{padding:16px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.dash-card-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--dark)}
.dash-card-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.dash-card.accent .dash-card-num{color:var(--accent)}
.dash-card.green .dash-card-num{color:var(--green)}
.dash-card.blue .dash-card-num{color:var(--blue)}
.health-list{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.health-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.health-item:last-child{border-bottom:none}
.health-name{flex:1;font-size:13px;font-weight:600;color:var(--dark)}
.health-score{font-size:13px;font-weight:700}
.score-bar-wrap{width:80px;height:6px;background:#EAE6DF;border-radius:3px;flex-shrink:0}
.score-bar{height:6px;border-radius:3px;transition:width 0.4s}
.dash-sec-lbl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}

/* FILTERS */
.filters{padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:96px;z-index:100}
.filters input,.filters select{padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none}
.filters input{flex:1 1 150px}
.filter-tags{display:flex;gap:5px;flex-wrap:wrap;padding:6px 14px 10px;background:var(--bg)}
.filter-tag{font-size:11px;background:var(--tag-bg);color:var(--tag-color);border-radius:20px;padding:3px 10px;cursor:pointer;border:1.5px solid transparent}
.filter-tag.active{border-color:var(--accent);background:#FDF3EC;color:var(--accent);font-weight:600}

/* GRID */
.grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px 16px;cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.card.overdue::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.card-top{display:flex;gap:11px;align-items:flex-start}
.card-info{flex:1;min-width:0}
.card-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--dark)}
.card-role{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap;align-items:center}
.card-meta span{font-size:11px;color:var(--muted)}
.days-ok{color:var(--green)!important}.days-warn{color:var(--accent)!important}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;background:var(--tag-bg);color:var(--tag-color);border-radius:20px;padding:2px 8px}
.score-pill{font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;white-space:nowrap}
.cbadge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;border-radius:5px;padding:2px 6px;white-space:nowrap}
.c1{background:#FDF3EC;color:#7A4A2A}.c2{background:#EEF5F1;color:#2A5A3A}.c3{background:#EEF3FD;color:#2A3A7A}.c4{background:#F5EEF8;color:#5A2A7A}.c5{background:#F2F2F5;color:#3A3A5A}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;flex-shrink:0;letter-spacing:.02em}
.empty{text-align:center;padding:60px 20px}
.empty-title{font-family:'Playfair Display',serif;font-size:20px;color:#3A3630;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--muted)}
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* LOG SEARCH */
.log-search-wrap{padding:14px;border-bottom:1px solid var(--border)}
.log-search-wrap input{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none}
.log-list{padding:0 14px 14px}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.log-item-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.log-item-name{font-size:13px;font-weight:600;color:var(--dark)}
.log-item-type{font-size:12px;color:var(--muted)}
.log-item-date{font-size:11px;color:var(--muted)}
.log-item-note{font-size:12px;color:#5A5550;margin-top:4px;font-style:italic}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(28,26,23,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--cream);border-radius:18px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);border:1px solid var(--border)}
.mbody{padding:22px 24px}
@media(max-width:600px){.mbody{padding:18px 16px}}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mtitle{font-family:'Playfair Display',serif;font-size:20px;color:var(--dark)}
.btn-x{background:none;border:none;font-size:22px;cursor:pointer;color:#9A9085;line-height:1;padding:4px}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
@media(max-width:480px){.fgrid{grid-column:1fr}}
.ffull{grid-column:1/-1}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #E0DBD3;background:var(--input-bg);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none;transition:border 0.15s}
.field textarea{resize:vertical;min-height:72px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.cselector{display:flex;gap:6px}
.copt{border:2px solid var(--border);border-radius:8px;padding:7px 6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;background:var(--cream);transition:all 0.15s;text-align:center;flex:1}
.copt.sel.c1{border-color:#C17B4E;background:#FDF3EC;color:#7A4A2A;font-weight:600}
.copt.sel.c2{border-color:#5A8A6A;background:#EEF5F1;color:#2A5A3A;font-weight:600}
.copt.sel.c3{border-color:#4A6AAA;background:#EEF3FD;color:#2A3A7A;font-weight:600}
.copt.sel.c4{border-color:#8A4AAA;background:#F5EEF8;color:#5A2A7A;font-weight:600}
.copt.sel.c5{border-color:#5A5A7A;background:#F2F2F5;color:#3A3A5A;font-weight:600}
.copt-num{font-size:17px;font-weight:700;font-family:'Playfair Display',serif;display:block}
.copt-lbl{font-size:9px;color:var(--muted);margin-top:1px;display:block}
.tag-row{display:flex;gap:7px}
.tag-row input{flex:1}
.btn-tag{padding:9px 12px;border-radius:8px;background:var(--tag-bg);border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--tag-color);white-space:nowrap}
.tags-list{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.tag-rm{font-size:12px;background:var(--tag-bg);color:var(--tag-color);border-radius:20px;padding:3px 9px;display:flex;align-items:center;gap:4px}
.tag-x{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.faction{display:flex;justify-content:space-between;margin-top:10px}
.btn-del{background:none;border:1.5px solid #E8C9A0;color:var(--accent);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:9px 14px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted)}
.btn-save{background:var(--dark);color:var(--cream);border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;margin-left:7px}
.btn-save:disabled{background:#C8C2BB;cursor:not-allowed}

/* DETAIL */
.dhdr{display:flex;gap:13px;align-items:flex-start;margin-bottom:18px}
.dname{font-family:'Playfair Display',serif;font-size:20px;color:var(--dark);margin-bottom:3px}
.drole{font-size:13px;color:var(--muted);margin-bottom:5px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.icell{background:#F7F4EF;border-radius:9px;padding:10px 12px}
.icell-lbl{font-size:10px;color:#9A9085;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.icell-val{font-size:13px;color:var(--dark)}
.icell-val a{color:var(--accent);text-decoration:none}
.cbar{background:#F7F4EF;border-radius:9px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.cbar-lbl{font-size:10px;color:#9A9085;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.cbar-val{font-size:13px}
.days-none{color:#9A9085}
.btn-log{background:var(--accent);color:var(--cream);border:none;border-radius:7px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.abtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:13px}
.abtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 7px;border-radius:10px;border:1.5px solid var(--border);background:var(--cream);cursor:pointer;text-decoration:none;transition:all 0.15s;font-family:'DM Sans',sans-serif;color:var(--dark)}
.abtn:hover{border-color:var(--accent);background:#FDF3EC}
.abtn.disabled{opacity:.4;pointer-events:none}
.abtn-icon{font-size:19px}
.abtn-lbl{font-size:11px;font-weight:600;text-align:center}
.abtn-sub{font-size:10px;color:var(--muted);text-align:center}
.rbox{background:#F7F4EF;border-radius:9px;padding:11px 13px;margin-bottom:12px}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.rbox-info{font-size:13px;color:var(--dark)}
.rbox-next{font-size:12px;color:var(--muted);margin-top:3px}
.rbox-next.urgent{color:var(--accent)}

/* NOTES JOURNAL */
.notes-journal{margin-bottom:12px}
.note-entry{background:#F7F4EF;border-radius:9px;padding:10px 13px;margin-bottom:7px}
.note-entry-date{font-size:10px;color:#9A9085;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between}
.note-entry-text{font-size:13px;color:#3A3630;line-height:1.6;white-space:pre-wrap}
.btn-add-note{width:100%;padding:10px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--muted);margin-bottom:12px}
.btn-add-note:hover{border-color:var(--accent);color:var(--accent)}

/* GOALS */
.goals-list{margin-bottom:12px}
.goal-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#F7F4EF;border-radius:9px;margin-bottom:7px}
.goal-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--cream)}
.goal-check.done{background:var(--green);border-color:var(--green);color:white}
.goal-body{flex:1;min-width:0}
.goal-title{font-size:13px;color:var(--dark);font-weight:500}
.goal-title.done{text-decoration:line-through;color:var(--muted)}
.goal-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px}
.goal-priority{font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px}
.goal-priority.high{background:#FDF3EC;color:#7A4A2A}
.goal-priority.medium{background:#EEF3FD;color:#2A3A7A}
.goal-priority.low{background:#F2F2F5;color:#3A3A5A}
.btn-del-goal{background:none;border:none;cursor:pointer;color:#C8B4A0;font-size:13px;padding:2px;flex-shrink:0}

/* TASKS */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:#F7F4EF;border-radius:9px;margin-bottom:7px}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--cream)}
.task-check.done{background:var(--green);border-color:var(--green);color:white}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;color:var(--dark);font-weight:500}
.task-title.done{text-decoration:line-through;color:var(--muted)}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.task-due.overdue{color:var(--accent);font-weight:600}
.task-due.today{color:var(--green);font-weight:600}
.task-priority{font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px}
.task-priority.high{background:#FDF3EC;color:#7A4A2A}
.task-priority.medium{background:#EEF3FD;color:#2A3A7A}
.task-priority.low{background:#F2F2F5;color:#3A3A5A}
.btn-del-task{background:none;border:none;cursor:pointer;color:#C8B4A0;font-size:13px;padding:2px}

/* INTERACTION LOG */
.ilog-entry{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.ilog-entry:last-child{border-bottom:none}
.ilog-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.ilog-body{flex:1}
.ilog-type{font-size:13px;font-weight:600;color:var(--dark)}
.ilog-date{font-size:11px;color:var(--muted);margin-top:1px}
.ilog-note{font-size:12px;color:#5A5550;margin-top:3px;font-style:italic}
.btn-del-log{background:none;border:none;cursor:pointer;color:#C8B4A0;font-size:14px;padding:2px;flex-shrink:0}
.btn-edit{width:100%;padding:11px;border-radius:9px;background:var(--tag-bg);border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:#3A3630}

/* LOG FORM */
.log-types{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.log-type-btn{border:2px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--cream);transition:all 0.15s;display:flex;align-items:center;gap:5px}
.log-type-btn.active{border-color:var(--accent);background:#FDF3EC;color:var(--accent);font-weight:600}

/* MASS MESSAGE */
.mm-class-grid{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.mm-class-btn{border:2px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--cream);transition:all 0.15s;font-weight:500;text-align:center}
.mm-class-btn.active{border-color:var(--accent);background:#FDF3EC;color:var(--accent);font-weight:600}
.send-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:260px;overflow-y:auto}
.send-item{display:flex;align-items:center;gap:10px;background:#F7F4EF;border-radius:10px;padding:8px 12px;transition:opacity 0.3s;cursor:pointer}
.send-item:hover{background:#EEE9E2}
.send-item.sent{opacity:.4;cursor:default}
.send-item.selected{background:#FDF3EC;border:1.5px solid var(--accent)}
.send-item-info{flex:1;min-width:0}
.send-item-name{font-size:13px;font-weight:600;color:var(--dark)}
.send-item-phone{font-size:11px;color:var(--muted);margin-top:1px}
.send-sel-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:var(--cream)}
.send-sel-check.on{background:var(--accent);border-color:var(--accent);color:white}
.sbtn{border:none;border-radius:7px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;white-space:nowrap}
.sbtn.wa{background:#25D366;color:white}
.sbtn.curr{background:var(--accent);color:white;animation:pulse 1s infinite}
.sbtn.done{background:#EEF5F1;color:var(--green);pointer-events:none}
.copy-box{background:#F7F4EF;border-radius:9px;padding:11px 13px;margin-bottom:12px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:var(--cream);padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;animation:tin 0.2s ease,tout 0.3s ease 1.7s forwards;white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(8px)}}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="import-json-file" accept=".json" style="display:none">
<input type="file" id="import-csv-file" accept=".csv" style="display:none">
<script>
const SUPABASE_URL='https://hyrfuuhluaicdmlroosh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5cmZ1dWhsdWFpY2RtbHJvb3NoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzMzMjQsImV4cCI6MjA5MTUwOTMyNH0.gnVkt7WFPVqXmtEOPdj9b7myi3as99wJe5is0jJYObI';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const RELS=['Friend','Family','Colleague','Mentor','Client','Acquaintance','Other'];
const CLASSES=[{num:1,label:'Weekly',days:7},{num:2,label:'Bi-weekly',days:14},{num:3,label:'Monthly',days:30},{num:4,label:'Quarterly',days:90},{num:5,label:'Yearly',days:365}];
const LOG_TYPES=[{key:'message',icon:'💬',label:'Message'},{key:'call',icon:'📞',label:'Phone Call'},{key:'meeting',icon:'🤝',label:'Meeting'},{key:'lunch',icon:'🥗',label:'Lunch'},{key:'dinner',icon:'🍽',label:'Dinner'},{key:'other',icon:'📌',label:'Other'}];
const PRIORITIES=['high','medium','low'];

let contacts=[],loading=true,syncStatus='synced';
let S={view:'list',detailId:null,search:'',filterClass:'',filterRel:'',filterTag:'',sortBy:'name',tab:'contacts',logSearch:''};
let formData=null,tagInput='',modalView=null;
let mmClass=1,mmMsg='',mmQueue=[],mmIndex=0,mmSelected=new Set();
let logContactId=null,logType='message',logDate='',logNote='';
let pendingLog=null;
let editingLog=null; // {contactId, interactionId}
// goal form state
let goalForm={contactId:null,title:'',dueDate:'',priority:'medium'};
let taskForm={contactId:null,title:'',dueDate:'',priority:'medium',notes:''};
// note form state
let noteForm={contactId:null,text:''};
let showNoteForm=false,showGoalForm=false;

// ── UTILS ────────────────────────────────────────────────────────────────────
function daysSince(d){if(!d)return null;const[y,m,dd]=d.split('-').map(Number);const local=new Date(y,m-1,dd);const now=new Date();now.setHours(0,0,0,0);return Math.floor((now-local)/86400000);}
function daysUntilDue(c){if(!c.classification)return null;const cl=CLASSES.find(x=>x.num===c.classification);if(!cl)return null;const s=daysSince(c.last_contact);if(s===null)return 0;return cl.days-s;}
function isOverdue(c){const d=daysUntilDue(c);return d!==null&&d<=0;}
function fmtDate(d){if(!d)return'—';const[y,m,dd]=d.split('-').map(Number);return new Date(y,m-1,dd).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function hue(n){return((n||'').charCodeAt(0)*37)%360;}
function today(){return new Date().toISOString().split('T')[0];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function classOf(c){return CLASSES.find(x=>x.num===c.classification)||null;}
function overdueList(){return contacts.filter(c=>c.classification&&isOverdue(c)).sort((a,b)=>(daysUntilDue(a)||0)-(daysUntilDue(b)||0));}
function cleanPhone(p){return(p||'').replace(/[\s\-\(\)\+]/g,'');}
function firstName(n){return(n||'').split(' ')[0];}
function logTypeInfo(key){return LOG_TYPES.find(t=>t.key===key)||LOG_TYPES[0];}
function newC(){return{id:null,name:'',email:'',phone:'',role:'',company:'',relationship:'',classification:null,timezone:'',tags:[],notes_journal:[],goals:[],tasks:[],interactions:[],last_contact:'',birthday:''};}
function allTags(){const s=new Set();contacts.forEach(c=>(c.tags||[]).forEach(t=>s.add(t)));return Array.from(s).sort();}

// Birthday helpers
function bdayDaysFromNow(birthday){
  if(!birthday)return null;
  const now=new Date();const b=new Date(birthday);
  let next=new Date(now.getFullYear(),b.getMonth(),b.getDate());
  if(next<now)next=new Date(now.getFullYear()+1,b.getMonth(),b.getDate());
  return Math.ceil((next-now)/(1000*60*60*24));
}
function bdayAge(birthday){if(!birthday)return null;const[y]=birthday.split('-').map(Number);return new Date().getFullYear()-y;}
function upcomingBirthdays(){
  return contacts.map(c=>({...c,daysUntil:bdayDaysFromNow(c.birthday)}))
    .filter(c=>c.daysUntil!==null&&c.daysUntil<=7).sort((a,b)=>a.daysUntil-b.daysUntil);
}

// ── TASK HELPERS ─────────────────────────────────────────────────────────────
function dueTasks(){
  const results=[];
  contacts.forEach(c=>{
    (c.tasks||[]).filter(t=>!t.done&&t.dueDate&&t.dueDate<=today()).forEach(t=>{
      results.push({...t,contactName:c.name,contactId:c.id});
    });
    // Also add overdue/due goals
    (c.goals||[]).filter(g=>!g.done&&g.dueDate&&g.dueDate<=today()).forEach(g=>{
      results.push({id:g.id,title:g.title,dueDate:g.dueDate,contactName:c.name,contactId:c.id,isGoal:true});
    });
  });
  return results.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
}

// ── RELATIONSHIP SCORE ───────────────────────────────────────────────────────
// Score 0-100 based on: consistency (40%), frequency (30%), variety (30%)
function relationshipScore(c){
  if(!c.classification)return null;
  const cl=classOf(c);if(!cl)return null;
  const interactions=c.interactions||[];
  if(!interactions.length)return 0;

  // Consistency: how well are they keeping up with the schedule?
  const due=daysUntilDue(c);
  const consistencyScore=due===null?0:due>=0?Math.min(100,100-(due<0?Math.abs(due)/cl.days*100:0)):Math.max(0,100+due/cl.days*100);

  // Frequency: interactions in last 90 days vs expected
  const recent=interactions.filter(i=>daysSince(i.date)<=90).length;
  const expected=Math.ceil(90/cl.days);
  const freqScore=Math.min(100,(recent/expected)*100);

  // Variety: how many different types used
  const types=new Set(interactions.map(i=>i.type));
  const varietyScore=Math.min(100,(types.size/3)*100); // 3+ types = full score

  const total=Math.round(consistencyScore*0.4+freqScore*0.3+varietyScore*0.3);
  return Math.min(100,Math.max(0,total));
}

function scoreColor(s){
  if(s===null)return'#C8C2BB';
  if(s>=70)return'#5A8A6A';
  if(s>=40)return'#C17B4E';
  return'#C05A5A';
}
function scoreLabel(s){
  if(s===null)return'No class';
  if(s>=70)return'Strong';
  if(s>=40)return'Warm';
  return'Weak';
}

// Next contact date
function nextContactDate(c){
  if(!c.classification||!c.last_contact)return null;
  const cl=classOf(c);if(!cl)return null;
  const[y,m,dd]=c.last_contact.split('-').map(Number);const last=new Date(y,m-1,dd);last.setDate(last.getDate()+cl.days);const py=last.getFullYear(),pm=String(last.getMonth()+1).padStart(2,'0'),pd=String(last.getDate()).padStart(2,'0');return `${py}-${pm}-${pd}`;
}

// ── SUPABASE ─────────────────────────────────────────────────────────────────
async function fetchContacts(){
  setSyncStatus('syncing');
  const{data,error}=await sb.from('contacts').select('*').order('name');
  if(error){setSyncStatus('error');showToast('Failed to load contacts');return;}
  contacts=data.map(c=>({...c,tags:c.tags||[],interactions:c.interactions||[],notes_journal:c.notes_journal||[],goals:c.goals||[],tasks:c.tasks||[]}));
  loading=false;setSyncStatus('synced');render();
}
async function upsertContact(c){
  setSyncStatus('syncing');
  const payload={
    name:c.name,email:c.email||null,phone:c.phone||null,role:c.role||null,
    company:c.company||null,relationship:c.relationship||null,
    classification:c.classification||null,last_contact:c.last_contact||null,
    birthday:c.birthday||null,timezone:c.timezone||null,
    tags:c.tags||[],notes:c.notes||null,
    notes_journal:c.notes_journal||[],goals:c.goals||[],
    interactions:c.interactions||[],updated_at:new Date().toISOString()
  };
  if(c.id){
    const{error}=await sb.from('contacts').update(payload).eq('id',c.id);
    if(error){setSyncStatus('error');showToast('Save failed');return null;}
  }else{
    const{data,error}=await sb.from('contacts').insert(payload).select().single();
    if(error){setSyncStatus('error');showToast('Save failed');return null;}
    c={...c,...data};
  }
  setSyncStatus('synced');return c;
}
async function deleteContactDB(id){
  setSyncStatus('syncing');
  const{error}=await sb.from('contacts').delete().eq('id',id);
  if(error){setSyncStatus('error');showToast('Delete failed');return false;}
  setSyncStatus('synced');return true;
}
function setSyncStatus(s){
  syncStatus=s;
  const dot=document.getElementById('sync-dot');
  if(dot)dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){document.getElementById('app').innerHTML=buildApp();attachEvents();}

function buildApp(){
  const ov=overdueList();const bdays=upcomingBirthdays();
  const showBanners=S.tab==='contacts'&&!modalView;
  return`
    ${buildHeader(ov.length)}
    ${buildNavTabs()}
    ${showBanners&&bdays.length>0?buildBdayBanner(bdays):''}
    ${showBanners&&ov.length>0?buildOverdueBanner(ov):''}
    ${showBanners&&dueTasks().length>0?buildTasksBanner(dueTasks()):''}
    ${loading?'<div class="loading">Loading your contacts…</div>':buildTabContent()}
    ${S.view==='detail'&&modalView!=='edit-log'?buildDetailModal():''}
    ${S.view==='form'?buildFormModal():''}
    ${modalView==='log'?buildLogModal():''}

    ${modalView==='goal'?buildGoalModal():''}
    ${modalView==='task'?buildTaskModal():''}
    ${modalView==='edit-log'?buildEditLogModal():''}
    ${modalView==='note'?buildNoteModal():''}
    ${modalView==='io'?buildIOModal():''}
    ${modalView==='mass'?buildMassModal():''}`;
}

function buildHeader(ovCount){
  return`<div class="header">
    <div>
      <div class="header-title">Relations <span id="sync-dot" class="sync-dot${syncStatus==='syncing'?' syncing':syncStatus==='error'?' error':''}"></span></div>
      <div class="header-sub">${contacts.length} contact${contacts.length!==1?'s':''}${ovCount>0?` <span class="ov">· ${ovCount} overdue</span>`:''}</div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="btn-mass">✉ Mass</button>
      <button class="hbtn" id="btn-io">⬆⬇ Data</button>
      <button class="btn-new" id="btn-new">+ New</button>
    </div>
  </div>`;
}

function buildNavTabs(){
  const tabs=[{id:'contacts',label:'👥 Contacts'},{id:'dashboard',label:'📊 Dashboard'},{id:'logs',label:'📋 Logs'}];
  return`<div class="nav-tabs">${tabs.map(t=>`<button class="nav-tab${S.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}</div>`;
}

function buildTabContent(){
  if(S.tab==='dashboard')return buildDashboard();
  if(S.tab==='logs')return buildLogsView();
  return buildContactsTab();
}

function buildDashboard(){
  const ov=overdueList();
  const bdays=upcomingBirthdays();
  const now=new Date();
  const thisMonth=contacts.reduce((sum,c)=>{
    return sum+(c.interactions||[]).filter(i=>{const d=new Date(i.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  },0);
  const totalGoals=contacts.reduce((s,c)=>(c.goals||[]).length+s,0);
  const pendingGoals=contacts.reduce((s,c)=>(c.goals||[]).filter(g=>!g.done).length+s,0);

  // Relationship health — top 10 by score
  const scored=contacts.filter(c=>c.classification).map(c=>({...c,score:relationshipScore(c)})).sort((a,b)=>(a.score||0)-(b.score||0));
  const weakest=scored.slice(0,5);
  const strongest=scored.slice(-5).reverse();

  return`<div class="dashboard">
    <div class="dash-grid">
      <div class="dash-card"><div class="dash-card-num">${contacts.length}</div><div class="dash-card-lbl">Total Contacts</div></div>
      <div class="dash-card accent"><div class="dash-card-num">${ov.length}</div><div class="dash-card-lbl">Overdue</div></div>
      <div class="dash-card green"><div class="dash-card-num">${thisMonth}</div><div class="dash-card-lbl">Interactions This Month</div></div>
      <div class="dash-card blue"><div class="dash-card-num">${bdays.length}</div><div class="dash-card-lbl">Upcoming Birthdays</div></div>
      <div class="dash-card"><div class="dash-card-num">${pendingGoals}<span style="font-size:14px;color:var(--muted)">/${totalGoals}</span></div><div class="dash-card-lbl">Open Goals</div></div>
    </div>
    ${weakest.length>0?`<div class="dash-sec-lbl">⚠ Needs Attention</div>
    <div class="health-list">${weakest.map(c=>{const s=c.score;return`<div class="health-item" data-id="${c.id}" style="cursor:pointer">
      <div class="health-name">${esc(c.name)}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${s}%;background:${scoreColor(s)}"></div></div>
      <div class="health-score" style="color:${scoreColor(s)}">${s}%</div>
    </div>`;}).join('')}</div>`:''}
    ${strongest.length>0?`<div class="dash-sec-lbl">💪 Strongest Relationships</div>
    <div class="health-list">${strongest.map(c=>{const s=c.score;return`<div class="health-item" data-id="${c.id}" style="cursor:pointer">
      <div class="health-name">${esc(c.name)}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${s}%;background:${scoreColor(s)}"></div></div>
      <div class="health-score" style="color:${scoreColor(s)}">${s}%</div>
    </div>`;}).join('')}</div>`:''}
  </div>`;
}

function buildLogsView(){
  const q=S.logSearch.toLowerCase();
  const allLogs=[];
  contacts.forEach(c=>(c.interactions||[]).forEach(i=>allLogs.push({...i,contactName:c.name,contactId:c.id})));
  allLogs.sort((a,b)=>b.date.localeCompare(a.date));
  const filtered=q?allLogs.filter(l=>`${l.contactName} ${l.type} ${l.note||''}`.toLowerCase().includes(q)):allLogs;
  return`<div class="log-search-wrap">
    <input id="log-search-input" type="search" placeholder="Search logs by name, type, notes…" value="${esc(S.logSearch)}">
  </div>
  <div class="log-list">
    ${filtered.length===0?'<div class="empty"><div class="empty-title">No logs found</div></div>':
    filtered.slice(0,100).map(l=>{const t=logTypeInfo(l.type);return`<div class="log-item">
      <div class="log-item-hdr">
        <span class="log-item-name">${t.icon} ${esc(l.contactName)}</span>
        <span class="log-item-date">${fmtDate(l.date)}</span>
      </div>
      <div class="log-item-type">${t.label}</div>
      ${l.note?`<div class="log-item-note">${esc(l.note)}</div>`:''}
    </div>`;}).join('')}
  </div>`;
}

function buildContactsTab(){
  const q=S.search.toLowerCase();
  let f=contacts.filter(c=>{
    if(q&&!`${c.name} ${c.company} ${c.role} ${(c.tags||[]).join(' ')}`.toLowerCase().includes(q))return false;
    if(S.filterClass&&c.classification!==parseInt(S.filterClass))return false;
    if(S.filterRel&&c.relationship!==S.filterRel)return false;
    if(S.filterTag&&!(c.tags||[]).includes(S.filterTag))return false;
    return true;
  });
  f.sort((a,b)=>{
    if(S.sortBy==='name')return a.name.localeCompare(b.name);
    if(S.sortBy==='recent')return(b.last_contact||'0').localeCompare(a.last_contact||'0');
    if(S.sortBy==='overdue')return(daysUntilDue(a)||999)-(daysUntilDue(b)||999);
    if(S.sortBy==='score')return(relationshipScore(b)||0)-(relationshipScore(a)||0);
    return 0;
  });
  const tags=allTags();
  const cards=f.length===0
    ?`<div class="empty"><div class="empty-title">${contacts.length===0?'Your network starts here':'No matches'}</div><div class="empty-sub">${contacts.length===0?'Tap + New to add your first contact.':'Try adjusting your search.'}</div></div>`
    :f.map(c=>buildCard(c)).join('');
  return`<div class="filters">
    <input id="s-search" type="search" placeholder="Search…" value="${esc(S.search)}">
    <select id="s-class"><option value="">All Classes</option>${CLASSES.map(cl=>`<option value="${cl.num}" ${S.filterClass==cl.num?'selected':''}>C${cl.num} · ${cl.label}</option>`).join('')}</select>
    <select id="s-rel"><option value="">All Types</option>${RELS.map(r=>`<option value="${r}" ${S.filterRel===r?'selected':''}>${r}</option>`).join('')}</select>
    <select id="s-sort"><option value="name" ${S.sortBy==='name'?'selected':''}>Name</option><option value="recent" ${S.sortBy==='recent'?'selected':''}>Recent</option><option value="overdue" ${S.sortBy==='overdue'?'selected':''}>Overdue</option><option value="score" ${S.sortBy==='score'?'selected':''}>Score</option></select>
  </div>
  ${tags.length>0?`<div class="filter-tags">${tags.map(t=>`<span class="filter-tag${S.filterTag===t?' active':''}" data-ftag="${esc(t)}">${esc(t)}</span>`).join('')}</div>`:''}
  <div class="grid">${cards}</div>`;
}

function buildCard(c){
  const days=daysSince(c.last_contact);const due=daysUntilDue(c);const urgent=isOverdue(c);
  const h=hue(c.name);const roleStr=[c.role,c.company].filter(Boolean).join(' · ');
  const cl=classOf(c);const interactions=c.interactions||[];
  const last=interactions[interactions.length-1];const lastT=last?logTypeInfo(last.type):null;
  const dCls=days===null?'':(days<=7?'days-ok':urgent?'days-warn':'');
  const dLbl=days===null?'No contact logged':days===0?'Today':`${days}d ago`;
  const lastLbl=lastT?`${lastT.icon} ${lastT.label} · ${dLbl}`:dLbl;
  const nextDate=nextContactDate(c);
  const score=relationshipScore(c);
  const tags=(c.tags||[]).length>0?`<div class="card-tags">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:'';
  const openGoals=(c.goals||[]).filter(g=>!g.done).length;
  return`<div class="card${urgent?' overdue':''}" data-id="${c.id}">
    <div class="card-top">
      <div class="avatar" style="width:40px;height:40px;font-size:14px;background:hsl(${h},40%,82%);color:hsl(${h},40%,30%)">${initials(c.name)}</div>
      <div class="card-info">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="card-name">${esc(c.name)}</span>
          ${cl?`<span class="cbadge c${cl.num}">C${cl.num}</span>`:''}
          ${score!==null?`<span class="score-pill" style="background:${scoreColor(score)}22;color:${scoreColor(score)}">${score}%</span>`:''}
        </div>
        ${roleStr?`<div class="card-role">${esc(roleStr)}</div>`:''}
        ${c.timezone?`<div style="font-size:11px;color:var(--muted);margin-top:2px">🌍 ${esc(c.timezone)}</div>`:''}
        <div class="card-meta">
          ${c.relationship?`<span>📌 ${esc(c.relationship)}</span>`:''}
          <span class="${dCls}">${lastLbl}</span>
          ${cl&&due!==null?`<span class="${due<=0?'days-warn':''}">· ${due<=0?`${Math.abs(due)}d overdue`:nextDate?`Next: ${fmtDate(nextDate)}`:`${due}d left`}</span>`:''}
          ${openGoals>0?`<span>🎯 ${openGoals} goal${openGoals>1?'s':''}</span>`:''}
          ${(()=>{const ot=(c.tasks||[]).filter(t=>!t.done).length;return ot>0?`<span>📌 ${ot} task${ot>1?'s':''}</span>`:''})()}
        </div>
      </div>
    </div>${tags}
  </div>`;
}

function buildBdayBanner(bdays){
  return`<div class="banner bday-banner">
    <div class="banner-hdr">🎂 Upcoming Birthdays</div>
    ${bdays.map(c=>{
      const p=cleanPhone(c.phone);const fn=firstName(c.name);const age=bdayAge(c.birthday);
      const label=c.daysUntil===0?'🎉 Today!':`in ${c.daysUntil} day${c.daysUntil>1?'s':''}`;

// Compose popup — write message in CRM, send to WA, auto-log
function openComposePopup(contactId, phone, channel){
  const c=contacts.find(x=>x.id===contactId);if(!c)return;
  const fn=firstName(c.name);

  // Remove any existing popup
  const ex=document.getElementById('compose-overlay');if(ex)ex.remove();

  const overlay=document.createElement('div');
  overlay.id='compose-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(28,26,23,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';

  const chanLabel=channel==='sms'?'💬 SMS':channel==='wa'?'🟢 WhatsApp':'🟩 WA Business';
  const chanColor=channel==='sms'?'#1C1A17':'#25D366';

  overlay.innerHTML=`
    <div style="background:#FFFDF9;border-radius:18px;padding:22px;max-width:420px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.35)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-family:'Playfair Display',serif;font-size:17px;color:#1C1A17">Message to ${fn}</div>
        <button id="cp-cancel" style="background:none;border:none;font-size:22px;cursor:pointer;color:#9A9085">×</button>
      </div>
      <div style="font-size:12px;color:#7A7266;margin-bottom:12px">via ${chanLabel}</div>
      <div style="font-size:12px;font-weight:600;color:#7A7266;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">Log Type</div>
      <div id="cp-types" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
        ${LOG_TYPES.map(t=>`<button class="cp-type-btn" data-type="${t.key}" style="border:2px solid #EAE6DF;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;background:#FFFDF9;display:flex;align-items:center;gap:4px">${t.icon} ${t.label}</button>`).join('')}
      </div>
      <div style="font-size:12px;font-weight:600;color:#7A7266;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px">Your Message</div>
      <div style="display:flex;align-items:flex-start;gap:0;border:1.5px solid #E8C9A0;border-radius:10px;overflow:hidden;margin-bottom:12px">
        <div style="padding:10px 12px;background:#FDF3EC;font-size:14px;font-family:'DM Sans',sans-serif;color:#7A4A2A;white-space:nowrap;border-right:1px solid #E8C9A0">Hi ${fn},</div>
        <textarea id="cp-msg" placeholder="type your message here…" style="flex:1;padding:10px 12px;border:none;outline:none;font-size:14px;font-family:'DM Sans',sans-serif;color:#1C1A17;resize:none;min-height:90px;background:#FFFDF9"></textarea>
      </div>
      <button id="cp-copy" style="width:100%;padding:12px;border-radius:10px;background:#1C1A17;color:white;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;margin-bottom:8px">📋 Step 1 — Copy Message</button>
      <button id="cp-send" style="width:100%;padding:14px;border-radius:10px;background:${chanColor};color:white;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;opacity:0.4;pointer-events:none">${chanLabel} → Open & Paste</button>
    </div>`;

  document.body.appendChild(overlay);

  // Focus message box
  setTimeout(()=>document.getElementById('cp-msg').focus(),100);
  let msgCopied=false;

  // Step 1: Copy button
  document.getElementById('cp-copy').addEventListener('click',()=>{
    const msgEl=document.getElementById('cp-msg');
    const fn2=fn; // closure
    const msgBody2=(msgEl?msgEl.value:'').trim();
    const fullMsg2=`Hi ${fn2}, ${msgBody2}`;
    const copyBtn=document.getElementById('cp-copy');
    const sendBtn=document.getElementById('cp-send');
    function onCopied(){
      msgCopied=true;
      copyBtn.textContent='✅ Copied!';
      copyBtn.style.background='#5A8A6A';
      sendBtn.style.opacity='1';
      sendBtn.style.pointerEvents='auto';
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(fullMsg2).then(onCopied).catch(()=>{
        const ta=document.createElement('textarea');ta.value=fullMsg2;
        ta.style.cssText='position:fixed;top:0;left:0;opacity:0;width:1px;height:1px';
        document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,99999);
        try{document.execCommand('copy');}catch(e){}
        document.body.removeChild(ta);onCopied();
      });
    } else {
      const ta=document.createElement('textarea');ta.value=fullMsg2;
      ta.style.cssText='position:fixed;top:0;left:0;opacity:0;width:1px;height:1px';
      document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,99999);
      try{document.execCommand('copy');}catch(e){}
      document.body.removeChild(ta);onCopied();
    }
  });

  // Track selected log type
  let selectedType='message';
  document.querySelectorAll('.cp-type-btn').forEach(btn=>{
    if(btn.dataset.type==='message'){btn.style.borderColor='#C17B4E';btn.style.background='#FDF3EC';btn.style.fontWeight='600';}
    btn.addEventListener('click',()=>{
      selectedType=btn.dataset.type;
      document.querySelectorAll('.cp-type-btn').forEach(b=>{b.style.borderColor='#EAE6DF';b.style.background='#FFFDF9';b.style.fontWeight='400';});
      btn.style.borderColor='#C17B4E';btn.style.background='#FDF3EC';btn.style.fontWeight='600';
    });
  });

  // Cancel
  document.getElementById('cp-cancel').addEventListener('click',()=>overlay.remove());
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});

  // Send (only works after copy)
  document.getElementById('cp-send').addEventListener('click',()=>{
    if(!msgCopied)return;
    const msgEl=document.getElementById('cp-msg');
    const msgBody=(msgEl?msgEl.value:'').trim();
    const fullMsg=`Hi ${fn}, ${msgBody}`;
    const p=phone;

    // Log the interaction with message content
    logInteractionLocal(contactId,selectedType,today(),fullMsg);

    // Open the app (message already copied in Step 1)
    if(channel==='sms'){
      window.location.href=`sms:${p}?body=${encodeURIComponent(fullMsg)}`;
    } else if(channel==='wa'){
      window.open(`https://wa.me/${p}`,'_blank');
    } else {
      window.open(`https://api.whatsapp.com/send?phone=${p}`,'_blank');
    }
    showToast('✓ Sent & logged — paste in WhatsApp');
    overlay.remove();
  });
}

function buildMassModal(){
  const allRecipients=contacts.filter(c=>cleanPhone(c.phone));
  const classRecipients=contacts.filter(c=>c.classification===mmClass&&cleanPhone(c.phone));
  // If mmSelected has items, use that; otherwise use class
  const useSelected=mmSelected.size>0;
  const recipients=useSelected?contacts.filter(c=>mmSelected.has(c.id)&&cleanPhone(c.phone)):classRecipients;

  const classBtns=CLASSES.map(cl=>`<button class="mm-class-btn${mmClass===cl.num?' active':''}" data-mmcl="${cl.num}">C${cl.num} · ${cl.label}</button>`).join('');
  const isRunning=mmQueue.length>0&&mmIndex<mmQueue.length;

  const sendItems=allRecipients.length===0
    ?`<div style="font-size:13px;color:var(--muted);padding:10px 0">No contacts with phone.</div>`
    :(useSelected?allRecipients:classRecipients).map((c,i)=>{
      const isCurr=isRunning&&mmIndex===mmQueue.findIndex(x=>x.id===c.id);
      const isSent=isRunning&&mmQueue.findIndex(x=>x.id===c.id)<mmIndex;
      const isSel=mmSelected.has(c.id);
      return`<div class="send-item${isSent?' sent':''}" data-mmid="${c.id}">
        ${useSelected||!isRunning?`<div class="send-sel-check${isSel?' on':''}">${isSel?'✓':''}</div>`:''}
        <div class="avatar" style="width:30px;height:30px;font-size:11px;flex-shrink:0;background:hsl(${hue(c.name)},40%,82%);color:hsl(${hue(c.name)},40%,30%)">${initials(c.name)}</div>
        <div class="send-item-info">
          <div class="send-item-name">${esc(c.name)}</div>
          <div class="send-item-phone">${esc(c.phone)}</div>
        </div>
        ${isSent?`<span class="sbtn done">✓</span>`:isCurr?`<span class="sbtn curr">▶</span>`:''}
      </div>`;
    }).join('');

  return`<div class="overlay" id="overlay"><div class="modal" onclick="event.stopPropagation()"><div class="mbody">
    <div class="mhdr"><div class="mtitle">Mass Message</div><button class="btn-x" id="btn-close-modal">×</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Each message starts with <strong>"Hi [First Name],"</strong>. WhatsApp opens for each contact — send, come back, tap Next.</div>

    <div class="sec-lbl">Select by Class</div>
    <div class="mm-class-grid">${classBtns}</div>

    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Or tap contacts below to select specific people across any class:</div>
    <span class="mm-sel-all" id="btn-sel-all">${mmSelected.size>0?'Clear selection':'Select all in class'}</span>

    <div class="field" style="margin-top:8px"><label>Your message (after "Hi [Name],")</label><textarea id="mm-msg" placeholder="just wanted to check in…" style="min-height:80px">${esc(mmMsg)}</textarea></div>

    <div class="sec-lbl">Contacts — ${recipients.length} selected with phone</div>
    <div class="send-list">${sendItems}</div>

    ${!isRunning&&recipients.length>0?`<button id="btn-start-mass" style="width:100%;padding:13px;border-radius:10px;background:${mmMsg.trim()?'#25D366':'#C8C2BB'};color:white;border:none;cursor:${mmMsg.trim()?'pointer':'not-allowed'};font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;margin-bottom:8px">🟢 Start Sending (${recipients.length} contacts)</button>`:''}
    ${isRunning?`<div style="display:flex;gap:8px;margin-bottom:8px">
      <button id="btn-next-mass" style="flex:2;padding:13px;border-radius:10px;background:#25D366;color:white;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif">▶ Next →</button>
      <button id="btn-stop-mass" style="flex:1;padding:13px;border-radius:10px;background:#F0EDE8;color:#7A7266;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif">Stop</button>
    </div>`:''}
    <div class="mm-progress" id="mm-progress">${isRunning?`${mmIndex} of ${mmQueue.length} sent`:''}</div>
  </div></div></div>`;
}

// ── MASS SEND ────────────────────────────────────────────────────────────────
function startMassSend(){
  const msgEl=document.getElementById('mm-msg');if(msgEl)mmMsg=msgEl.value;
  if(!mmMsg.trim())return;
  mmQueue=mmSelected.size>0
    ?contacts.filter(c=>mmSelected.has(c.id)&&cleanPhone(c.phone))
    :contacts.filter(c=>c.classification===mmClass&&cleanPhone(c.phone));
  if(!mmQueue.length)return;
  mmIndex=0;openCurrentInQueue();render();
}
function openCurrentInQueue(){
  if(mmIndex>=mmQueue.length){showToast(`✅ All ${mmQueue.length} messages sent!`);mmQueue=[];mmIndex=0;mmSelected=new Set();render();return;}
  const c=mmQueue[mmIndex];
  const p=cleanPhone(c.phone);const fn=firstName(c.name);
  const url=`https://wa.me/${p}?text=${encodeURIComponent(`Hi ${fn}, ${mmMsg}`)}`;
  window.open(url,'_blank');
  logInteractionLocal(c.id,'message',today(),`Mass WhatsApp: Hi ${fn}, ${mmMsg}`);
}
function nextInQueue(){
  mmIndex++;
  const prog=document.getElementById('mm-progress');
  if(prog)prog.textContent=`${mmIndex} of ${mmQueue.length} sent`;
  if(mmIndex>=mmQueue.length){showToast(`✅ All ${mmQueue.length} messages sent!`);mmQueue=[];mmIndex=0;mmSelected=new Set();render();}
  else{render();openCurrentInQueue();}
}
function stopMassSend(){mmQueue=[];mmIndex=0;render();}

// ── GOALS & NOTES ─────────────────────────────────────────────────────────────
function openGoalForm(contactId){goalForm={contactId,title:'',dueDate:'',priority:'medium'};modalView='goal';render();}
function openNoteForm(contactId){noteForm={contactId,text:''};modalView='note';render();}

function openTaskForm(contactId){taskForm={contactId,title:'',dueDate:'',priority:'medium',notes:''};modalView='task';render();}

function toggleTask(contactId,taskId){
  contacts=contacts.map(c=>{
    if(c.id!==contactId)return c;
    const tasks=(c.tasks||[]).map(t=>t.id===taskId?{...t,done:!t.done,doneDate:!t.done?today():''}:t);
    return{...c,tasks};
  });
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);
  render();
}
function deleteTask(contactId,taskId){
  contacts=contacts.map(c=>{if(c.id!==contactId)return c;return{...c,tasks:(c.tasks||[]).filter(t=>t.id!==taskId)};});
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);render();
}
function markTaskDoneFromBanner(contactId,taskId,isGoal){
  if(isGoal){
    contacts=contacts.map(c=>{if(c.id!==contactId)return c;const goals=(c.goals||[]).map(g=>g.id===taskId?{...g,done:true,doneDate:today()}:g);return{...c,goals};});
  } else {
    contacts=contacts.map(c=>{if(c.id!==contactId)return c;const tasks=(c.tasks||[]).map(t=>t.id===taskId?{...t,done:true,doneDate:today()}:t);return{...c,tasks};});
  }
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);
  showToast('Marked done ✓');render();
}

function toggleGoal(contactId,goalId){
  contacts=contacts.map(c=>{
    if(c.id!==contactId)return c;
    const goals=(c.goals||[]).map(g=>g.id===goalId?{...g,done:!g.done,doneDate:!g.done?today():''}:g);
    return{...c,goals};
  });
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);
  render();
}
function deleteGoal(contactId,goalId){
  contacts=contacts.map(c=>{if(c.id!==contactId)return c;return{...c,goals:(c.goals||[]).filter(g=>g.id!==goalId)};});
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);render();
}
function deleteNote(contactId,noteId){
  contacts=contacts.map(c=>{if(c.id!==contactId)return c;return{...c,notes_journal:(c.notes_journal||[]).filter(n=>n.id!==noteId)};});
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);render();
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function logInteractionLocal(contactId,type,date,note){
  const entry={id:Date.now().toString()+Math.random().toString(36).slice(2),type,date,note:note||''};
  contacts=contacts.map(c=>{
    if(c.id!==contactId)return c;
    const interactions=[...(c.interactions||[]),entry].sort((a,b)=>a.date.localeCompare(b.date));
    return{...c,interactions,last_contact:date};
  });
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);
}
function deleteInteractionLocal(contactId,interactionId){
  contacts=contacts.map(c=>{
    if(c.id!==contactId)return c;
    const interactions=(c.interactions||[]).filter(i=>i.id!==interactionId);
    const lastDate=interactions.length?interactions[interactions.length-1].date:'';
    return{...c,interactions,last_contact:lastDate};
  });
  const c=contacts.find(x=>x.id===contactId);if(c)upsertContact(c);
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents(){
  on('btn-new','click',()=>{formData=newC();tagInput='';S.view='form';render();});
  on('btn-mass','click',()=>{mmQueue=[];mmIndex=0;mmSelected=new Set();modalView='mass';render();});
  on('btn-io','click',()=>{modalView='io';render();});

  // Nav tabs
  document.querySelectorAll('.nav-tab').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.tab;S.view='list';render();}));

  // Dashboard health items
  document.querySelectorAll('.health-item').forEach(el=>el.addEventListener('click',()=>{S.detailId=el.dataset.id;S.view='detail';render();}));

  // Log search
  oninp('log-search-input',v=>{S.logSearch=v;render();});

  // Banners
  document.querySelectorAll('.overdue-log-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();logContactId=b.dataset.id;logType='message';logDate=today();logNote='';modalView='log';render();}));
  document.querySelectorAll('.bday-log-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();logContactId=b.dataset.id;logType='message';logDate=today();logNote='';modalView='log';render();}));

  // Filters
  oninp('s-search',v=>{S.search=v;render();});
  onchg('s-class',v=>{S.filterClass=v;render();});
  onchg('s-rel',v=>{S.filterRel=v;render();});
  onchg('s-sort',v=>{S.sortBy=v;render();});
  document.querySelectorAll('.filter-tag').forEach(el=>el.addEventListener('click',()=>{S.filterTag=S.filterTag===el.dataset.ftag?'':el.dataset.ftag;render();}));

  // Cards
  document.querySelectorAll('.card').forEach(card=>card.addEventListener('click',()=>{S.detailId=card.dataset.id;S.view='detail';render();}));

  // Detail
  on('btn-close-modal','click',closeModal);
  on('btn-open-log','click',()=>{logContactId=S.detailId;logType='message';logDate=today();logNote='';modalView='log';render();});
  on('btn-edit-contact','click',()=>{formData={...contacts.find(c=>c.id===S.detailId)};tagInput='';S.view='form';render();});
  document.querySelectorAll('.btn-del-log').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete this interaction?')){deleteInteractionLocal(b.dataset.cid,b.dataset.iid);render();}}));
  document.querySelectorAll('.btn-edit-log').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    e.preventDefault();
    const cid=b.dataset.cid;
    const iid=b.dataset.iid;
    editingLog={contactId:cid,interactionId:iid};
    modalView='edit-log';
    // Small defer to ensure click doesn't bubble to overlay
    requestAnimationFrame(()=>render());
  }));

  // Log modals
  on('btn-close-log','click',()=>{modalView=null;render();});
  on('btn-close-log-2','click',()=>{modalView=null;render();});
  on('btn-skip-log','click',()=>{modalView=null;render();});
  document.querySelectorAll('.log-type-btn').forEach(b=>b.addEventListener('click',()=>{
    const de=document.getElementById('log-date');if(de)logDate=de.value;
    const ne=document.getElementById('log-note');if(ne)logNote=ne.value;
    logType=b.dataset.ltype;render();
  }));
  on('btn-save-log','click',()=>{
    const de=document.getElementById('log-date');const ne=document.getElementById('log-note');
    const d=de?de.value:today();const n=ne?ne.value:'';
    logInteractionLocal(logContactId,logType,d,n);
    showToast(`${logTypeInfo(logType).icon} ${logTypeInfo(logType).label} logged ✓`);
    modalView=null;render();
  });

  // Edit log modal
  on('btn-close-edit-log','click',()=>{modalView=null;render();});
  on('btn-close-edit-log-2','click',()=>{modalView=null;render();});
  let editLogType=null;
  document.querySelectorAll('#edit-log-types .log-type-btn').forEach(b=>b.addEventListener('click',()=>{
    editLogType=b.dataset.ltype;
    document.querySelectorAll('#edit-log-types .log-type-btn').forEach(x=>{x.classList.remove('active');});
    b.classList.add('active');
  }));
  on('btn-save-edit-log','click',()=>{
    if(!editingLog)return;
    const c=contacts.find(x=>x.id===editingLog.contactId);if(!c)return;
    const dateEl=document.getElementById('edit-log-date');
    const noteEl=document.getElementById('edit-log-note');
    const typeBtn=document.querySelector('.log-type-btn.active');
    const newType=typeBtn?typeBtn.dataset.ltype:null;
    const newDate=dateEl?dateEl.value:'';
    const newNote=noteEl?noteEl.value:'';
    contacts=contacts.map(ct=>{
      if(ct.id!==editingLog.contactId)return ct;
      const interactions=(ct.interactions||[]).map(i=>{
        if(i.id!==editingLog.interactionId)return i;
        return{...i,type:newType||i.type,date:newDate||i.date,note:newNote};
      }).sort((a,b)=>a.date.localeCompare(b.date));
      const lastDate=interactions.length?interactions[interactions.length-1].date:ct.last_contact;
      return{...ct,interactions,last_contact:lastDate};
    });
    const updated=contacts.find(x=>x.id===editingLog.contactId);
    if(updated)upsertContact(updated);
    showToast('Interaction updated ✓');
    editingLog=null;modalView=null;render();
  });

  // Goal modal
  on('btn-close-goal','click',()=>{modalView=null;render();});
  on('btn-close-goal-2','click',()=>{modalView=null;render();});
  oninp('goal-title',v=>{goalForm.title=v;});
  onchg('goal-due',v=>{goalForm.dueDate=v;});
  onchg('goal-priority',v=>{goalForm.priority=v;});
  on('btn-save-goal','click',()=>{
    const titleEl=document.getElementById('goal-title');
    const dueEl=document.getElementById('goal-due');
    const priEl=document.getElementById('goal-priority');
    const title=titleEl?titleEl.value.trim():'';
    if(!title)return;
    const goal={id:Date.now().toString(),title,dueDate:dueEl?dueEl.value:'',priority:priEl?priEl.value:'medium',done:false,doneDate:''};
    contacts=contacts.map(c=>{if(c.id!==goalForm.contactId)return c;return{...c,goals:[...(c.goals||[]),goal]};});
    const c=contacts.find(x=>x.id===goalForm.contactId);if(c)upsertContact(c);
    showToast('Goal added ✓');modalView=null;render();
  });

  // Task modal
  on('btn-close-task','click',()=>{modalView=null;render();});
  on('btn-close-task-2','click',()=>{modalView=null;render();});
  on('btn-save-task','click',()=>{
    const titleEl=document.getElementById('task-title');
    const dueEl=document.getElementById('task-due');
    const priEl=document.getElementById('task-priority');
    const notesEl=document.getElementById('task-notes');
    const title=titleEl?titleEl.value.trim():'';
    if(!title){showToast('Please enter a task title');return;}
    const task={id:Date.now().toString(),title,dueDate:dueEl?dueEl.value:'',priority:priEl?priEl.value:'medium',notes:notesEl?notesEl.value:'',done:false,doneDate:''};
    contacts=contacts.map(c=>{if(c.id!==taskForm.contactId)return c;return{...c,tasks:[...(c.tasks||[]),task]};});
    const c=contacts.find(x=>x.id===taskForm.contactId);if(c)upsertContact(c);
    showToast('Task added ✓');modalView=null;render();
  });

  // Note modal
  on('btn-close-note','click',()=>{modalView=null;render();});
  on('btn-close-note-2','click',()=>{modalView=null;render();});
  on('btn-save-note','click',()=>{
    const textEl=document.getElementById('note-text');
    const text=textEl?textEl.value.trim():'';
    if(!text)return;
    const note={id:Date.now().toString(),date:today(),text};
    contacts=contacts.map(c=>{if(c.id!==noteForm.contactId)return c;return{...c,notes_journal:[...(c.notes_journal||[]),note]};});
    const c=contacts.find(x=>x.id===noteForm.contactId);if(c)upsertContact(c);
    showToast('Note saved ✓');modalView=null;render();
  });

  // Form
  oninp('f-name',v=>{formData.name=v;syncSave();});
  oninp('f-email',v=>{formData.email=v;});
  oninp('f-phone',v=>{formData.phone=v;});
  oninp('f-role',v=>{formData.role=v;});
  oninp('f-company',v=>{formData.company=v;});
  oninp('f-timezone',v=>{formData.timezone=v;});
  onchg('f-rel',v=>{formData.relationship=v;});
  onchg('f-bday',v=>{formData.birthday=v;});
  document.querySelectorAll('.copt').forEach(el=>el.addEventListener('click',()=>{formData.classification=parseInt(el.dataset.cl);render();}));
  const tagEl=document.getElementById('f-tag');
  if(tagEl){tagEl.addEventListener('input',e=>{tagInput=e.target.value;});tagEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addTag();}});}
  on('btn-add-tag','click',addTag);
  document.querySelectorAll('.tag-x').forEach(el=>el.addEventListener('click',()=>{formData.tags=formData.tags.filter(t=>t!==el.dataset.tag);render();}));
  on('btn-save-contact','click',saveContact);
  on('btn-del-contact','click',deleteContact);
  on('btn-close-modal-2','click',closeModal);

  // Mass message
  document.querySelectorAll('.mm-class-btn').forEach(b=>b.addEventListener('click',()=>{
    const nv=document.getElementById('mm-msg');if(nv)mmMsg=nv.value;
    mmClass=parseInt(b.dataset.mmcl);mmSelected=new Set();mmQueue=[];mmIndex=0;render();
  }));
  // Toggle contact selection in mass send list
  document.querySelectorAll('.send-item[data-mmid]').forEach(el=>el.addEventListener('click',()=>{
    if(mmQueue.length>0)return; // don't change selection while running
    const id=el.dataset.mmid;
    if(mmSelected.has(id))mmSelected.delete(id);else mmSelected.add(id);
    render();
  }));
  on('btn-sel-all','click',()=>{
    const nv=document.getElementById('mm-msg');if(nv)mmMsg=nv.value;
    if(mmSelected.size>0){mmSelected=new Set();}
    else{contacts.filter(c=>c.classification===mmClass&&cleanPhone(c.phone)).forEach(c=>mmSelected.add(c.id));}
    render();
  });
  const mmEl=document.getElementById('mm-msg');if(mmEl)mmEl.addEventListener('input',e=>{mmMsg=e.target.value;});
  on('btn-start-mass','click',startMassSend);
  on('btn-next-mass','click',nextInQueue);
  on('btn-stop-mass','click',stopMassSend);

  // IO
  on('btn-export-json','click',exportJSON);
  on('btn-export-csv','click',exportCSV);
  on('btn-import-json','click',()=>document.getElementById('import-json-file').click());
  on('btn-import-csv','click',()=>document.getElementById('import-csv-file').click());

  ['overlay','overlay-log','overlay-goal','overlay-note','overlay-edit-log','overlay-task'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('click',e=>{if(e.target===el)closeModal();});
  });
  document.addEventListener('keydown',onKey,{once:true});
}

function onKey(e){if(e.key==='Escape')closeModal();}
function closeModal(){
  if(['log','log-after','goal','note','edit-log','task'].includes(modalView)){editingLog=null;modalView=null;render();return;}
  if(S.view==='form')formData=null;
  S.view='list';S.detailId=null;modalView=null;render();
}
function addTag(){const t=(tagInput||'').trim();if(t&&!(formData.tags||[]).includes(t))formData.tags=[...(formData.tags||[]),t];tagInput='';render();}
function syncSave(){const b=document.getElementById('btn-save-contact');if(b)b.disabled=!formData.name.trim();}

async function saveContact(){
  if(!formData.name.trim())return;
  if(!formData.interactions)formData.interactions=[];
  if(!formData.notes_journal)formData.notes_journal=[];
  if(!formData.goals)formData.goals=[];
  const saved=await upsertContact(formData);
  if(!saved)return;
  if(formData.id){contacts=contacts.map(c=>c.id===saved.id?saved:c);}
  else{contacts=[...contacts,saved];}
  showToast(formData.id?'Contact updated ✓':'Contact added ✓');
  formData=null;S.view='list';render();
}
async function deleteContact(){
  if(!confirm('Delete this contact?'))return;
  const ok=await deleteContactDB(formData.id);if(!ok)return;
  contacts=contacts.filter(c=>c.id!==formData.id);
  showToast('Contact deleted');formData=null;S.view='list';render();
}

// Export / Import
function exportJSON(){const b=new Blob([JSON.stringify(contacts,null,2)],{type:'application/json'});dl(b,'relations-contacts.json');showToast('Exported ✓');}
function exportCSV(){
  const lti=key=>LOG_TYPES.find(t=>t.key===key)||LOG_TYPES[0];
  const cols=['name','email','phone','role','company','relationship','classification','last_contact','birthday','timezone','tags','total_interactions','relationship_score'];
  const rows=contacts.map(c=>cols.map(k=>{
    if(k==='tags')return'"'+(c.tags||[]).join('|')+'"';
    if(k==='total_interactions')return(c.interactions||[]).length;
    if(k==='relationship_score'){const s=relationshipScore(c);return s!==null?s:'';}
    return'"'+String(c[k]||'').replace(/"/g,'""')+'"';
  }).join(','));
  const logCols=['contact_name','date','type','notes'];
  const logRows=[];
  contacts.forEach(c=>(c.interactions||[]).forEach(i=>{logRows.push(['"'+c.name.replace(/"/g,'""')+'"','"'+(i.date||'')+'"','"'+lti(i.type).label+'"','"'+(i.note||'').replace(/"/g,'""')+'"'].join(','));}));
  logRows.sort();
  const goalCols=['contact_name','goal','priority','due_date','done'];
  const goalRows=[];
  contacts.forEach(c=>(c.goals||[]).forEach(g=>{goalRows.push(['"'+c.name.replace(/"/g,'""')+'"','"'+g.title.replace(/"/g,'""')+'"','"'+g.priority+'"','"'+(g.dueDate||'')+'"',g.done?'Yes':'No'].join(','));}));
  const taskCols=['contact_name','task','priority','due_date','done','notes'];
  const taskRows=[];
  contacts.forEach(c=>(c.tasks||[]).forEach(t=>{taskRows.push(['"'+c.name.replace(/"/g,'""')+'"','"'+t.title.replace(/"/g,'""')+'"','"'+t.priority+'"','"'+(t.dueDate||'')+'"',t.done?'Yes':'No','"'+(t.notes||'').replace(/"/g,'""')+'"'].join(','));}));
  const csv=['=== CONTACTS ===',cols.join(','),...rows,'','=== INTERACTION LOGS ===',logCols.join(','),...logRows,'','=== GOALS ===',goalCols.join(','),...goalRows,'','=== TASKS ===',taskCols.join(','),...taskRows].join('\n');
  dl(new Blob([csv],{type:'text/csv'}),'relations-contacts.csv');showToast('CSV exported ✓');
}
function dl(blob,name){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}

document.getElementById('import-json-file').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async e=>{try{const data=JSON.parse(e.target.result);if(!Array.isArray(data))throw new Error();let count=0;for(const c of data){const ex=contacts.find(x=>x.name.toLowerCase()===c.name.toLowerCase());if(!ex){await upsertContact({...c,id:null,interactions:c.interactions||[],notes_journal:c.notes_journal||[],goals:c.goals||[],tasks:c.tasks||[]});count++;}}await fetchContacts();showToast(`Imported ${count} contacts ✓`);modalView=null;render();}catch{showToast('Invalid JSON file');}};
  r.readAsText(file);this.value='';
});
document.getElementById('import-csv-file').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async e=>{try{const lines=e.target.result.split('\n').filter(l=>l.trim());const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());let count=0;for(const line of lines.slice(1)){const vals=line.match(/("([^"]*)"|[^,]*)/g)||[];const row={};headers.forEach((h,i)=>row[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());if(!row.name)continue;const ex=contacts.find(x=>x.name.toLowerCase()===row.name.toLowerCase());if(!ex){await upsertContact({id:null,name:row.name,email:row.email||'',phone:row.phone||'',role:row.role||'',company:row.company||'',relationship:row.relationship||'',classification:parseInt(row.classification)||null,last_contact:row.last_contact||'',birthday:row.birthday||'',timezone:row.timezone||'',tags:String(row.tags||'').split(/[|,]/).map(t=>t.trim()).filter(Boolean),notes_journal:[],goals:[],tasks:[],interactions:[]});count++;}}await fetchContacts();showToast(`Imported ${count} contacts ✓`);modalView=null;render();}catch{showToast('Could not read file.');}};
  r.readAsText(file);this.value='';
});

function on(id,ev,fn){const el=document.getElementById(id);if(el)el.addEventListener(ev,fn);}
function oninp(id,fn){const el=document.getElementById(id);if(el)el.addEventListener('input',e=>fn(e.target.value));}
function onchg(id,fn){const el=document.getElementById(id);if(el)el.addEventListener('change',e=>fn(e.target.value));}
function showToast(msg){const ex=document.querySelector('.toast');if(ex)ex.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

render();
fetchContacts();
</script>
</body>
</html>
